spring:
  application:
    name: EventGatewayService
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}   # dev locally; set prod/docker for the JSON+file+async pipeline

  datasource:
    url: jdbc:h2:mem:event
    driver-class-name: org.h2.Driver
    username: user
    password: password

    jpa:
      hibernate:
        ddl-auto: create-drop
      show-sql: true
      properties:
        hibernate:
          format_sql: true

    h2:
      console:
        enabled: true
        path: /h2-console

  # --- Feign timeouts ---
  cloud:
    openfeign:
      client:
        config:
          account-service:
            connect-timeout: 1000   # ms - fail fast on connection issues
            read-timeout: 2000      # ms - Account Service calls should be fast (local network)
      # NOT enabling spring.cloud.openfeign.circuitbreaker here on purpose:
      # the breaker is applied via @CircuitBreaker on AccountServiceClientImpl,
      # one layer above the Feign client itself - enabling both would wrap
      # the call in two independent breakers.

# --- Account Service connection ---
accountService:
  url: ${ACCOUNT_SERVICE_URL:http://localhost:8081}

# --- Resilience4j circuit breaker: annotation-based wiring (@CircuitBreaker
# in AccountServiceClientImpl), thresholds defined here as properties ---
resilience4j:
  circuitbreaker:
    instances:
      accountService:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10                  # evaluate the last 10 calls
        minimumNumberOfCalls: 5                # need 5 calls before the breaker can trip
        failureRateThreshold: 50               # OPEN if >=50% of those calls fail
        waitDurationInOpenState: 10s           # stay OPEN for 10s before trying again
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:
          - feign.FeignException.NotFound
          - feign.FeignException.BadRequest
      accountServiceRead:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:
          - feign.FeignException.NotFound
          - feign.FeignException.BadRequest
  retry:
    instances:
      accountService:
        maxAttempts: 3                    # 1 initial call + 2 retries
        waitDuration: 200ms               # base delay before the FIRST retry
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2    # delay doubles each attempt: 200ms -> 400ms -> 800ms
        enableRandomizedWait: true         # jitter: randomizes the delay so multiple
        randomizedWaitFactor: 0.5          # Gateway instances don't retry in lockstep
        # (0.5 = delay varies +/-50% around the computed value)
        retryExceptions:
          - feign.RetryableException       # Feign's wrapper for connection/timeout failures
          - java.io.IOException
        ignoreExceptions:
          - com.ameya.eventgatewayservice.exception.DuplicateEventConflictException
      accountServiceRead:
        maxAttempts: 2                    # fewer attempts than the write path - a balance
        # read is cheap to just fail fast and let the
        # Gateway's caller retry the GET itself if needed
        waitDuration: 200ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        enableRandomizedWait: true
        randomizedWaitFactor: 0.5
        retryExceptions:
          - feign.RetryableException
          - java.io.IOException
  ratelimiter:
    instances:
      eventSubmission:
        limitForPeriod: 10       # allow 10 calls...
        limitRefreshPeriod: 1s   # ...per 1 second window
        timeoutDuration: 0

management:
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true   # surfaces breaker state in /actuator/health
  endpoints:
    web:
      exposure:
        include: health, prometheus, metrics, circuitbreakers, info
  tracing:
    sampling:
      # Fraction of requests that get a real trace recorded end-to-end.
      # 1.0 = trace everything (fine for a take-home/demo and for low-traffic
      # services). In real production under load, this is typically much
      # lower (e.g. 0.05-0.1) to control export volume/cost - the traceId is
      # still generated either way, but unsampled traces are NOT exported.
      probability: 1.0
      enabled: true


logging:
  level:
    root: INFO
    com.example.eventgateway: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    feign: INFO   # bump to DEBUG temporarily to see full Feign request/response bodies

